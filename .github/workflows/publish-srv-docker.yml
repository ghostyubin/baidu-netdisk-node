name: 发布 baidu-netdisk-sync 镜像

run-name: ${{ github.event.head_commit.message || github.event_name }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'srv-v*'
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/baidu-netdisk-sync

jobs:
  # ──────────────────────────────────────────
  # 第一步：多平台并行构建
  # ──────────────────────────────────────────
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
            suffix: armv7

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 配置 QEMU（仅 armv7）
        if: matrix.suffix == 'armv7'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取版本号
        run: |
          VERSION=$(jq -r .version ./packages/srv/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/srv/Dockerfile
          platforms: ${{ matrix.platform }}
          # 只有 main 分支或 tag 才实际推送镜像，其他分支仅构建验证
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.suffix }}-${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.suffix }},mode=max,image-manifest=true

  # ──────────────────────────────────────────
  # 第二步：合并多平台 manifest
  # ──────────────────────────────────────────
  merge:
    runs-on: ubuntu-latest
    needs: build
    if: |
      needs.build.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 读取版本号
        run: |
          VERSION=$(jq -r .version ./packages/srv/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 合并多平台 manifest 并推送
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.run_id }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.run_id }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:armv7-${{ github.run_id }}
