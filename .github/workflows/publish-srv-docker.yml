name: 发布 baidu-netdisk-sync 镜像

on:
  workflow_dispatch:
  push:
    tags:
      - 'srv-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/baidu-netdisk-sync

jobs:
  # ──────────────────────────────────────────
  # 第一步：多平台并行构建（各平台原生 runner）
  # ──────────────────────────────────────────
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64：普通 runner 原生构建
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          # arm64：GitHub 原生 arm64 runner（免费），无需 QEMU
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          # armv7：arm64 runner 上用 QEMU 模拟，比在 amd64 上快很多
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
            suffix: armv7

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 BuildX
        uses: docker/setup-buildx-action@v3

      - name: 配置 QEMU（仅 armv7 需要）
        if: matrix.suffix == 'armv7'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取版本号
        run: |
          VERSION=$(jq -r .version ./packages/srv/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 构建并推送（带平台后缀的临时 tag）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/srv/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.suffix }}-${{ github.run_id }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.suffix }},mode=max,image-manifest=true

  # ──────────────────────────────────────────
  # 第二步：合并多平台 manifest
  # ──────────────────────────────────────────
  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: 拉取代码（获取 package.json）
        uses: actions/checkout@v4

      - name: 提取版本号
        run: |
          VERSION=$(jq -r .version ./packages/srv/package.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 合并多平台镜像并推送最终 tag
        run: |
          SRCS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.run_id }} \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.run_id }} \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:armv7-${{ github.run_id }}"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ env.VERSION }} \
            $SRCS
